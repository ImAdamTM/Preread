<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes"
    />
    <title>{{TITLE}}</title>
    <style>
      :root {
        --bg: #000000;
        --text: #f0f0ff;
        --font: -apple-system, system-ui, sans-serif;
        --font-size: 18px;
        --line-height: 1.7;
        --max-width: 680px;
      }

      .light-mode {
        --bg: #fafafa;
        --text: #1a1a1a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        color: var(--text);
        font-family: var(--font);
        font-size: var(--font-size);
        line-height: var(--line-height);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        padding: 0px 20px 80px;
        word-wrap: break-word;
        overflow-wrap: break-word;
        background: linear-gradient(to bottom, transparent 0%, var(--bg) 350px);
      }

      .reader-container {
        max-width: var(--max-width);
        margin: 0 auto;
      }

      /* Title */
      .reader-title {
        font-size: 1.8em;
        font-weight: 700;
        line-height: 1.25;
        margin-bottom: 24px;
        letter-spacing: -0.02em;
      }

      /* Paragraphs */
      p {
        margin-bottom: 1.2em;
      }

      /* Headings */
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-weight: 600;
        line-height: 1.3;
        margin-top: 1.6em;
        margin-bottom: 0.6em;
      }

      h1 {
        font-size: 1.6em;
      }
      h2 {
        font-size: 1.4em;
      }
      h3 {
        font-size: 1.2em;
      }
      h4 {
        font-size: 1.1em;
      }
      h5,
      h6 {
        font-size: 1em;
      }

      /* Links — subtle hint, not distracting */
      a {
        color: #a8a8d0;
        text-decoration: underline;
        text-decoration-color: rgba(168, 168, 208, 0.35);
        text-underline-offset: 2px;
        transition: text-decoration-color 0.15s ease;
      }

      a:hover,
      a:active {
        text-decoration-color: rgba(168, 168, 208, 0.6);
      }

      .light-mode a {
        color: #5a5a8a;
        text-decoration-color: rgba(90, 90, 138, 0.3);
      }

      .light-mode a:hover,
      .light-mode a:active {
        text-decoration-color: rgba(90, 90, 138, 0.6);
      }

      /* Images */
      img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        margin: 16px 0;
        display: block;
      }

      /* Inline SVGs — constrain stray icons/decorations */
      svg {
        max-width: 1.5em;
        max-height: 1.5em;
        display: inline-block;
        vertical-align: middle;
      }

      figure {
        margin: 16px 0;
      }

      figcaption {
        font-size: 0.85em;
        color: #888899;
        margin-top: 8px;
        text-align: center;
        line-height: 1.4;
      }

      /* Blockquotes */
      blockquote {
        border-left: 3px solid;
        border-image: linear-gradient(to bottom, #5b5bde, #a855f7) 1;
        padding-left: 16px;
        margin: 1.2em 0;
        font-style: italic;
        color: #888899;
      }

      .light-mode blockquote {
        color: #666666;
      }

      /* Code */
      code {
        font-family: "SF Mono", ui-monospace, monospace;
        background: #1e1e2e;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.9em;
      }

      .light-mode code {
        background: #f0f0f5;
      }

      pre {
        background: #1e1e2e;
        border-radius: 8px;
        padding: 16px;
        overflow-x: auto;
        margin: 1.2em 0;
        -webkit-overflow-scrolling: touch;
      }

      .light-mode pre {
        background: #f0f0f5;
      }

      pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        font-size: 0.85em;
        line-height: 1.5;
      }

      /* Lists */
      ul,
      ol {
        padding-left: 1.5em;
        margin-bottom: 1.2em;
      }

      li {
        margin-bottom: 0.4em;
      }

      /* Horizontal rule */
      hr {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        margin: 2em 0;
      }

      .light-mode hr {
        border-top: 1px solid rgba(0, 0, 0, 0.1);
      }

      /* Strong / Emphasis */
      strong {
        font-weight: 600;
      }

      /* Table (basic) */
      table {
        display: block;
        max-width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-collapse: collapse;
        margin: 1.2em 0;
        font-size: 0.9em;
      }

      th,
      td {
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: left;
      }

      .light-mode th,
      .light-mode td {
        border-color: rgba(0, 0, 0, 0.1);
      }

      th {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="reader-container">
      <h1 class="reader-title">{{TITLE}}</h1>
      {{BODY_HTML}}
    </div>
  </body>
</html>
